<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <p><a href="index.html">Home</a></p>
    
    <h1>Informações Pessoais</h1>
    
    <fieldset>
        <legend>Cadastro do Cliente</legend>
        
        <label>Nome:</label>
        <input type="text" placeholder="Digite o nome do cliente" size="70">
        <br><br>

        <label>Idade:</label>
        <input type="text" placeholder="Digite a idade" size="9">
        <br><br>

        <label>Endereço:</label> <br>
        <input type="text" placeholder="Digite o endereço" size="110">
        <br><br>

        <label>Cidade:</label>
        <input type="text" placeholder="Digite a cidade" size="25">
        <br><br>

        <label>Estado:</label>
        <input type="text" placeholder="UF" size="1">
        <br><br>

        <label>CEP:</label>
        <input type="text" placeholder="XXXXX-XXX" size="9">
        <br><br>

        <label>Tel/Res:</label>
        <input type="text" placeholder="(XX) 99999-9999" size="13">
        <br><br>

        <label>Tel/Cel:</label>
        <input type="text" placeholder="(XX) 99999-9999" size="13">
        <br><br>

        <label>Email:</label> <br>
        <input type="email" placeholder="Digite o endereço de email" size="110">

    </fieldset>

    <input type="submit" name="Enviar">
    
</body>
</html>
