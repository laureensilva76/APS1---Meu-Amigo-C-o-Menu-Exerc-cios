<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banho e Tosa - Meu Amigo Cão</title>
</head>
<body>
    <p><a href="index.html">Home</a></p>

    <h1>Agendamento para Banho e Tosa</h1>

    <h2>Faça o seu agendamento com pelo menos 48 horas de antecedência</h2>

    <form>
        <fieldset>
            <legend>Identificação do dono do animal</legend>
            
            <label>Nome:</label>
            <input type="text" placeholder="Digite o nome completo do dono do animal" size="50">
            <br><br>

            <label>Endereço:</label>
            <input type="text" placeholder="Digite o endereço" size="70">
            <br><br>

            <label>CEP:</label>
            <input type="text" placeholder="XXXXX-XXX" size="10">
            <br><br>

            <label>Email:</label>
            <input type="email" placeholder="Digite o endereço de email" size="73">
            <br><br>

            <label>Tel/Cel:</label>
            <input type="text" placeholder="(XX) 99999-9999" size="12">
            <br>
        </fieldset>

        <fieldset>
            <legend>Animal</legend>

            <label>Nome:</label>
            <input type="text" placeholder="Digite o nome do animal" size="30">
            <br><br>

            <label>Porte do cão:</label>
            <input type="radio" name="porte"> Pequeno
            <input type="radio" name="porte"> Médio
            <input type="radio" name="porte"> Grande
            <br><br>

            <label>Tipo de tosa:</label>
            <select>
                <option>Nenhuma</option>
                <option>Higiênica</option>
                <option>Completa</option>
            </select>
            <br><br>

            <label>Observações:</label>
            <textarea rows="3" cols="45" placeholder="Digite alguma informação do animal se necessário"></textarea>
            <br>
        </fieldset>

        <fieldset>
            <legend>Horário - Obs: Não atendemos aos domingos e às segundas-feiras</legend>
            
            <label>Indique os dias da semana de sua preferência:</label>
            <br>
            <input type="checkbox"> Terça-Feira
            <input type="checkbox"> Quarta-Feira
            <input type="checkbox"> Quinta-Feira
            <input type="checkbox"> Sexta-Feira 
            <input type="checkbox"> Sábado
            <br><br>

            <label>Primeira opção de horário:</label>
            <input type="date">
            <br><br>

            <label>Segunda opção de horário:</label>
            <input type="date">
            <br>
        </fieldset>

        <input type="submit" value="Enviar">

    </form>
</body>
</html>
